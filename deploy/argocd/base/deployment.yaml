apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibs-qfc-kitchen
  labels:
    app.kubernetes.io/name: ibs-qfc-kitchen
    app.kubernetes.io/part-of: ibs-qfc-kitchen
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ibs-qfc-kitchen
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibs-qfc-kitchen
        app.kubernetes.io/part-of: ibs-qfc-kitchen
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ibs-registry
      containers:
        - name: web
          image: ibs-qfc-kitchen-web
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: nginx-cache, mountPath: /var/cache/nginx }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: nginx-cache, emptyDir: {} }

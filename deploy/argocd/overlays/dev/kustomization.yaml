  newTag: 1.1.0-dev.a24f9a3
- name: ibs-wissensdatenbank-portal
  newName: registry.apps.ibsolution.cloud/ibs/ib-wissensdatenbank/portal
  newTag: 1.1.0-dev.a24f9a3
- name: ibs-wissensdatenbank-worker

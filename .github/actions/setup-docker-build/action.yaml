name: "Setup Docker Build"
description: "Sets up Docker Buildx, cache, registry login, and optional checkout"
inputs:
  registry:
    description: "Docker registry URL"
    required: false
  username:
    description: "Docker registry username"
    required: false
  password:
    description: "Docker registry password"
    required: false
  cache-path:
    description: "Path for Docker layer cache"
    required: false
    default: "/tmp/docker_cache"
  cache-key-prefix:
    description: "Prefix for cache key to avoid collisions in matrix builds"
    required: false
    default: "docker"
  checkout:
    description: "Whether to checkout the repository"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache Docker layers
      uses: actions/cache@v6
      with:
        path: ${{ inputs.cache-path }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-

    - name: Login to Docker Registry
      uses: docker/login-action@v4
      if: ${{ inputs.registry != '' && inputs.username != '' && inputs.password != '' }}
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Checkout repository
      uses: actions/checkout@v7
      if: ${{ inputs.checkout == 'true' }}
